<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go/No-Go Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; background:#FFFFFF; display:flex; align-items:center; justify-content:center;">

  <div
    style="
      width: 375px;
      height: 812px;
      background: #EBEBEB;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Phetsarath, sans-serif;
      overflow: hidden;
    "
  >

  <!-- Header -->
  <div
    style="
      width: 100%;
      height: 85px;
      position: absolute;
      background: #ABAAA6;
    "
  ></div>

  <div
    style="
      left: 30px;
      top: 50px;
      width: 120px;
      position: absolute;
      color: #333333;
      font-size: 17px;
      font-weight: 700;
      font-family: Phetsarath, sans-serif;
    "
  >
    Go/No-Go Test
  </div>

<!-- Main Card -->
<div
style="
  width: 375px;
  height: 665px;
  left: 0px;
  top: 94px;
  position: absolute;
  background: #DEDEDE;
  border: 1px solid #CCCCCC;
"
></div>

<div
style="
  width: 355px;
  height: 642px;
  left: 10px;
  top: 107px;
  position: absolute;
  background: #EFEFEF;
  border-radius: 10px;
  border: 1px solid #CCCCCC;
"
></div>


  <!-- Oops Text -->
  <div
    style="
      width: 158px;
      height: 78px;
      left: 108.5px;
      top: 316px;
      position: absolute;
      text-align: center;
      font-size: 27px;
      font-weight: 700;
      color: #333333;
      line-height: 39px;
      font-family: Phetsarath, sans-serif;
    "
  >
    Oops! Keep going!
  </div>

  <!-- Grey X Button -->
  <div
    style="
      width: 161px;
      height: 110px;
      left: 107px;
      top: 512px;
      position: absolute;
      background: #BBBBBB;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      font-weight: 700;
      color: #FF0000;
      font-family: Phetsarath, sans-serif;
    "
  >
    ✗
  </div>

  <!-- Stop the Test Button -->
  <div
    style="
      width: 161px;
      height: 45px;
      left: 107px;
      top: 647px;
      position: absolute;
      background: #E8B6B6;
      border-radius: 10px;
      border: 1px solid #FF0C0C;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #FF383C;
      font-family: Phetsarath, sans-serif;
    "
  >
    Stop the test
</div>

<script src="../js/app.js"></script>
</body>
</html>
