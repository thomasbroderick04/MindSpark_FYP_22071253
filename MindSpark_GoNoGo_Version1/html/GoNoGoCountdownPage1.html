<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Go/No-Go Countdown</title>
</head>

<body style="margin:0; background:#FFFFFF; display:flex; align-items:center; justify-content:center;">

<div
  style="
    width: 375px;
    height: 812px;
    background: #EBEBEB;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: Phetsarath, sans-serif;
    overflow: hidden;
  "
>

  <!-- Header -->
  <div style="width: 375px; height: 85px; position: absolute; background: #ABAAA6"></div>

  <div style="left: 30px; top: 50px; width: 120px; text-align: center; position: absolute; font-size: 17px; font-weight: 700; color: #333333;">
    Go/No-Go Test
  </div>

  <!-- PRACTICE SECTION -->
  <div style="width: 375px; height: 125px; left: 0px; top: 95px; position: absolute">
    
    <div style="width: 375px; height: 125px; left: 0px; top: 0px; position: absolute; background: #DEDEDE; border: 1px #CCCCCC solid"></div>

    <div style="width: 109px; height: 29px; left: 10px; top: 10px; position: absolute; color: #333333; font-size: 20px; font-weight: 700;">
      Get Ready!
    </div>

    <div style="width: 309px; height: 15px; left: 10px; top: 51px; position: absolute; font-size: 14px; line-height: 15px; color: #333333;">
      Remember to focus on the <strong>centre</strong> of the screen
    </div>

    <div style="width: 329px; height: 20px; left: 23px; top: 98px; position: absolute; font-size: 14px; line-height: 15px; color: #333333;">
      <span>Current Rule: </span>
      <strong>Square = Press, Circle = Do Nothing</strong>
    </div>

  </div>

  <!-- Main Container -->
  <div style="width: 375px; height: 473px; left: 0px; top: 235px; position: absolute; background: #DEDEDE; border: 1px solid #CCCCCC"></div>
  <div style="width: 355px; height: 448px; left: 10px; top: 245px; position: absolute; background: #EFEFEF; border-radius: 10px; border: 1px solid #CCCCCC"></div>

  <div style="left: 109.5px; top: 278px; position: absolute; width: 156px; text-align: center; font-size: 15px; color: #333333;">
    The test will begin in...
  </div>

  <div style="left: 117.5px; top: 363px; position: absolute; text-align: center;">
    <!-- Countdown number (ID ADDED) -->
    <div
      id="countdownSeconds"
      style="font-size: 64px; font-weight: 700; color: #333333;"
    >
      10
    </div>
    <div style="font-size: 36px; color: #333333;">Seconds</div>
  </div>

  <!-- Bottom Nav Background -->
  <div
    style="
      position: absolute;
      bottom: 0px;
      width: 375px;
      height: 83px;
      background: #7D7D7D;
    "
  ></div>

<!-- Bottom Navigation -->
<div style="width:375px; height:83px; position:absolute; left:0px; top:729px; background:#7D7D7D;">

  <!-- Home -->
  <div style="width:70px; height:40px; position:absolute; left:22px; top:13.5px; background:#BBBBBB; border-radius:12px; display:flex; align-items:center; justify-content:center;">
    <div style="color:#333333; font-size:13px; font-weight:700;">
      Home
    </div>
  </div>

  <!-- Tests -->
  <div style="width:70px; height:40px; position:absolute; left:109px; top:13.5px; background:#BBBBBB; border-radius:12px; display:flex; align-items:center; justify-content:center;">
    <div style="color:#333333; font-size:13px; font-weight:700;">
      Tests
    </div>
  </div>

  <!-- Progress -->
  <div style="width:70px; height:40px; position:absolute; left:196px; top:13.5px; background:#BBBBBB; border-radius:12px; display:flex; align-items:center; justify-content:center;">
    <div style="color:#333333; font-size:13px; font-weight:700;">
      Progress
    </div>
  </div>

  <!-- Settings -->
  <div style="width:70px; height:40px; position:absolute; left:283px; top:13.5px; background:#BBBBBB; border-radius:12px; display:flex; align-items:center; justify-content:center;">
    <div style="color:#333333; font-size:13px; font-weight:700;">
      Settings
    </div>
  </div>

</div>

<!-- App logic -->
<script src="../js/app.js"></script>

</body>
</html>
