<!DOCTYPE html>
<html lang="en">

<body
  style="
    margin:0;
    background:#FFFFFF;
    display:flex;
    align-items:center;
    justify-content:center;
  "
>

  <div
    style="
      width: 375px;
      height: 812px;
      background: #EBEBEB;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Phetsarath, sans-serif;
      overflow: hidden;
    "
  >

    <!-- Header Section -->
    <div
      style="
        width: 100%;
        height: 85px;
        position: absolute;
        background: #ABAAA6;
      "
    ></div>

    <div
      style="
        position: absolute;
        left: 30px;
        top: 50px;
        width: 120px;
        color: #333333;
        font-size: 17px;
        font-weight: 700;
        font-family: Phetsarath, sans-serif;
      "
    >
      Go/No-Go Test
    </div>

    <!-- Main Card -->
    <div
      style="
        width: 375px;
        height: 665px;
        position: absolute;
        left: 0px;
        top: 94px;
        background: #DEDEDE;
        border: 1px solid #CCCCCC;
      "
    ></div>

    <div
      style="
        width: 355px;
        height: 642px;
        position: absolute;
        left: 10px;
        top: 107px;
        background: #EFEFEF;
        border-radius: 10px;
        border: 1px solid #CCCCCC;
      "
    ></div>

    <!-- Trial Information -->
    <div
      style="
        position: absolute;
        left: 40px;
        top: 120px;
        color: #333333;
        font-size: 12px;
        font-family: Phetsarath, sans-serif;
      "
    >
      Trial Number <span id="trialNumber">2</span> out of 100
    </div>

    <!-- Progress Bar -->
    <div
      style="
        width: 295px;
        height: 11px;
        position: absolute;
        left: 40px;
        top: 142px;
        background: #D9D9D9;
      "
    ></div>

    <div
      id="progress-bar"
      style="
        width: 5.9px;
        height: 11px;
        position: absolute;
        left: 40px;
        top: 142px;
        background: #5E5E5E;
      "
    ></div>

    <!-- Circle Stimulus -->
    <div
      id="stimulus"
      style="
        width: 189px;
        height: 186px;
        position: absolute;
        left: 93px;
        top: 253px;
        background: #0800FF;
        border-radius: 9999px;
      "
    ></div>

    <!-- Go Button -->
    <button
      id="goBtn"
      type="button"
      style="
        width: 161px;
        height: 110px;
        position: absolute;
        left: 107px;
        top: 512px;
        background: #5E5E5E;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: 700;
        color: #FFFFFF;
        font-family: Phetsarath, sans-serif;
        border: none;
        cursor: pointer;
      "
    >
      <svg
        width="60"
        height="60"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <rect x="9" y="2" width="6" height="12" rx="3"></rect>
        <path d="M5 10v2a7 7 0 0 0 14 0v-2"></path>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="8" y1="22" x2="16" y2="22"></line>
      </svg>
    </button>

    <!-- Stop Test Button -->
    <div
      style="
        width: 161px;
        height: 45px;
        position: absolute;
        left: 107px;
        top: 647px;
        background: #E8B6B6;
        border-radius: 10px;
        border: 1px solid #FF0C0C;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #FF383C;
        font-family: Phetsarath, sans-serif;
      "
    >
      Stop the test
    </div>
  </div>

  <script src="../js/app.js"></script>

</body>
</html>
