<!DOCTYPE html>
<html lang="en">

  <div
    style="
      width: 375px;
      height: 812px;
      background: #EBEBEB;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: Phetsarath, sans-serif;
      overflow: hidden;
    "
  >

    <!-- Header Section -->
    <div
      style="
        width: 100%;
        height: 85px;
        position: absolute;
        background: #ABAAA6;
      "
    ></div>

    <div
      style="
        position: absolute;
        left: 30px;
        top: 50px;
        width: 120px;
        color: #333333;
        font-size: 17px;
        font-weight: 700;
        font-family: Phetsarath, sans-serif;
      "
    >
      Go/No-Go Test
    </div>

    <!-- Main Card -->
    <div
      style="
        width: 375px;
        height: 665px;
        position: absolute;
        left: 0px;
        top: 94px;
        background: #DEDEDE;
        border: 1px solid #CCCCCC;
      "
    ></div>

    <div
      style="
        width: 355px;
        height: 642px;
        position: absolute;
        left: 10px;
        top: 107px;
        background: #EFEFEF;
        border-radius: 10px;
        border: 1px solid #CCCCCC;
      "
    ></div>

    <!-- Success Text -->
    <div
      style="
        width: 220px;
        height: 78px;
        position: absolute;
        left: 77.5px;
        top: 316px;
        text-align: center;
        font-size: 27px;
        line-height: 39px;
        font-weight: 700;
        color: #333333;
        font-family: Phetsarath, sans-serif;
      "
    >
      You are correct! Great work!
    </div>

    <div
      style="
        width: 161px;
        height: 110px;
        position: absolute;
        left: 107px;
        top: 512px;
        background: #BBBBBB;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        font-weight: 700;
        color: #00FF33;
        font-family: Phetsarath, sans-serif;
      "
    >
      ✓
    </div>

    <!-- Stop Test Secondary Button -->
    <div
      style="
        width: 161px;
        height: 45px;
        position: absolute;
        left: 107px;
        top: 647px;
        background: #E8B6B6;
        border-radius: 10px;
        border: 1px solid #FF0C0C;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        color: #FF383C;
        font-family: Phetsarath, sans-serif;
      "
    >
      Stop the test
    </div>
  </div>

  <script src="../js/app.js"></script>

</html>
