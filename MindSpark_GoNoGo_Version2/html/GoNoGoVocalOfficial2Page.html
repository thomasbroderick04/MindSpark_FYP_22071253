<!DOCTYPE html>
<html lang="en">
  <body
    style="
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Inter, sans-serif;
    "
  >
    <div
      style="
        width: 375px;
        height: 812px;
        position: relative;
        background: #E0ECEC;
        overflow: hidden;
        font-family: Inter, sans-serif;
      "
    >
      <!-- Main card -->
      <div
        style="
          width: 335px;
          height: 574px;
          position: absolute;
          left: 20px;
          top: 130px;
          background: white;
          box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.07);
          border-radius: 16px;
          border: 1px #d1d5db solid;
        "
      ></div>

      <!-- Stop Test button -->
      <div
      data-property-1="Default"
      style="
        width: 335px;
        height: 48px;
        position: absolute;
        left: 20px;
        top: 724px;
      "
    >
      <div
        style="
          width: 335px;
          height: 48px;
          position: absolute;
          left: 0;
          top: 0;
          background: white;
          border-radius: 100000px;
          border: 1px #A71818 solid;
        "
      ></div>

      <div
        data-svg-wrapper
        style="
          position: absolute;
          left: 98px;
          top: 12px;
        "
      >
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M6.4 19L5 17.6L10.6 12L5 6.4L6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19Z"
            fill="#A71818"
          />
        </svg>
      </div>

      <div
        style="
          position: absolute;
          left: 132px;
          top: 15px;
          display: flex;
          flex-direction: column;
          justify-content: center;
          text-align: center;
          color: #A71818;
          font-size: 15px;
          font-weight: 700;
          word-wrap: break-word;
        "
      >
        Stop Test
      </div>
    </div>

     <!-- Stimulus Circle -->
 <div
 id="stimulus"
 style="
   width: 197px;
   height: 198px;
   position: absolute;
   left: 89px;
   top: 263px;
   background: #1054B4;
   border-radius: 50%;
   box-shadow: 0px 2px 8px rgba(66, 64, 226, 0.80);
 "
></div>

      <!-- Trial text -->
      <div
        style="
          position: absolute;
          left: 40px;
          top: 150px;
          flex-direction: column;
          justify-content: center;
          color: #1a2322;
          font-size: 16px;
          font-weight: 800;
          word-wrap: break-word;
        "
      >
        Trial <span id="trialNumber">2</span> of 100
      </div>

       <!-- Progress bar -->
<div
style="
  width: 295px;
  height: 10px;
  position: absolute;
  left: 40px;
  top: 180px;
  background: #D0E5E2;
  border-radius: 999px;
  overflow: hidden;
"
>
<div
  id="progress-bar"
  style="
    width: 11.8px;
    height: 10px;
    position: absolute;
    background: #3A8C7E;
    border-radius: 999px;
  "
></div>
</div>

<!-- Go Button -->
<div
  style="
    width: 130px;
    height: 130px;
    justify-content: center;
    left: 114.5px;
    top: 514px;
    position: absolute;
  "
>
  <div
  id="goBtn"
    style="
      width: 130px;
      height: 130px;
      background: #007E72;
      border-radius: 9999px;
      border: 6px solid rgba(186, 223, 219, 0.5);
      box-shadow: 0 0 28px rgba(0, 201, 176, 0.40);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      text-align: center;
    "
  >
    <!-- Microphone Icon -->
    <svg width="45" height="45" viewBox="0 0 45 45" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.5 3.75C21.0082 3.75 19.5774 4.34263 18.5225 5.39752C17.4676 6.45242 16.875 7.88316 16.875 9.375V22.5C16.875 23.9918 17.4676 25.4226 18.5225 26.4775C19.5774 27.5324 21.0082 28.125 22.5 28.125C23.9918 28.125 25.4226 27.5324 26.4775 26.4775C27.5324 25.4226 28.125 23.9918 28.125 22.5V9.375C28.125 7.88316 27.5324 6.45242 26.4775 5.39752C25.4226 4.34263 23.9918 3.75 22.5 3.75Z"
          stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="M35.624 18.75V22.5C35.624 25.981 34.2412 29.3194 31.7798 31.7808C29.3184 34.2422 25.98 35.625 22.499 35.625C19.0181 35.625 15.6797 34.2422 13.2182 31.7808C10.7568 29.3194 9.37402 25.981 9.37402 22.5V18.75"
          stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <path d="M22.5 35.625V41.25"
          stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
  </div>
</div>

      <!-- Header -->
      <div
        style="
          width: 375px;
          height: 110px;
          position: absolute;
          left: 0;
          top: 0;
          background: linear-gradient(
            135deg,
            #003d38 0%,
            #005c54 25%,
            #007e72 50%,
            #00a99d 75%,
            #00c9b0 100%
          );
          border-bottom-right-radius: 24px;
          border-bottom-left-radius: 24px;
        "
      >
        <div
          style="
            position: absolute;
            left: 20px;
            top: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 800;
            line-height: 26.4px;
            word-wrap: break-word;
          "
        >
          Go/No-Go Test
        </div>

        <!-- Profile button -->
<div
style="
  width: 44px;
  height: 44px;
  position: absolute;
  left: 311px;
  top: 51.5px;
  border-radius: 22px;
  outline: 1px #d1d5db solid;
  outline-offset: -1px;
  overflow: hidden;
  background: #007e72;
"
>
<img
  src="../images/profilepicture.jpeg"
  alt="Profile"
  style="
    width: 100%;
    height: 100%;
    object-fit: cover;
  "
/>
</div>

        <!-- Bell icon -->
        <div
          style="
            width: 44px;
            height: 44px;
            position: absolute;
            left: 257px;
            top: 51.5px;
            background: #007e72;
            border-radius: 22px;
            outline: 1px #d1d5db solid;
            outline-offset: -1px;
          "
        >
          <div
            data-svg-wrapper
            style="
              position: absolute;
              left: 12px;
              top: 12px;
            "
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M15 6.6665C15 5.34042 14.4732 4.06865 13.5355 3.13097C12.5979 2.19329 11.3261 1.6665 10 1.6665C8.67392 1.6665 7.40215 2.19329 6.46447 3.13097C5.52678 4.06865 5 5.34042 5 6.6665C5 12.4998 2.5 14.1665 2.5 14.1665H17.5C17.5 14.1665 15 12.4998 15 6.6665Z"
                stroke="white"
                stroke-opacity="0.9"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M11.4419 17.5C11.2954 17.7526 11.0851 17.9622 10.8321 18.1079C10.5791 18.2537 10.2922 18.3304 10.0003 18.3304C9.70828 18.3304 9.42142 18.2537 9.1684 18.1079C8.91539 17.9622 8.7051 17.7526 8.55859 17.5"
                stroke="white"
                stroke-opacity="0.9"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/app.js"></script>

  </body>
</html>
