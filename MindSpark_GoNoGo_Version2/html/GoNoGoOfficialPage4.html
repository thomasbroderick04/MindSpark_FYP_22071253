<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="css/practice.css">
  </head>
  <body
    style="
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Inter, sans-serif;
    "
  >
    <div
      style="
        width: 375px;
        height: 812px;
        position: relative;
        background: #E0ECEC;
        overflow: hidden;
        font-family: Inter, sans-serif;
      "
    >
      <!-- Main card -->
      <div
        style="
          width: 335px;
          height: 574px;
          position: absolute;
          left: 20px;
          top: 130px;
          background: white;
          box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.07);
          border-radius: 16px;
          border: 1px #d1d5db solid;
        "
      ></div>

      <!-- Stop Test button -->
      <div
        style="
          width: 335px;
          height: 48px;
          position: absolute;
          left: 20px;
          top: 724px;
        "
      >
        <div
          style="
            width: 335px;
            height: 48px;
            position: absolute;
            left: 0;
            top: 0;
            background: white;
            border-radius: 100000px;
            border: 1px #A71818 solid;
          "
        ></div>

        <div
          data-svg-wrapper
          style="
            position: absolute;
            left: 98px;
            top: 12px;
          "
        >
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M6.4 19L5 17.6L10.6 12L5 6.4L6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19Z"
              fill="#A71818"
            />
          </svg>
        </div>

        <div
          style="
            position: absolute;
            left: 132px;
            top: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            color: #A71818;
            font-size: 15px;
            font-weight: 700;
            word-wrap: break-word;
          "
        >
          Stop Test
        </div>
      </div>

      <!-- Stimulus square -->
      <div
        id="stimulus"
        style="
          width: 197px;
          height: 198px;
          position: absolute;
          left: 89px;
          top: 263px;
          background: #e0a211;
          box-shadow: 0px 2px 8px rgba(224, 162, 17, 0.8);
          border-radius: 24px;
        "
      ></div>

     <!-- Trial text -->
     <div
     style="
       position: absolute;
       left: 40px;
       top: 150px;
       flex-direction: column;
       justify-content: center;
       color: #1a2322;
       font-size: 16px;
       font-weight: 800;
       word-wrap: break-word;
     "
   >
     Trial <span id="trialNumber">2</span> of 100
   </div>

    <!-- Progress bar -->
<div
style="
width: 295px;
height: 10px;
position: absolute;
left: 40px;
top: 180px;
background: #D0E5E2;
border-radius: 999px;
overflow: hidden;
"
>
<div
id="progress-bar"
style="
 width: 11.8px;
 height: 10px;
 position: absolute;
 background: #3A8C7E;
 border-radius: 999px;
"
></div>
</div>

     <!-- Tap Button -->
<div
id="goBtn"
style="
  width: 130px;
  height: 130px;
  left: 122.5px;
  top: 514px;
  position: absolute;
  cursor: pointer;
"
>
<div
  style="
    width: 130px;
    height: 130px;
    background: #007E72;
    border-radius: 9999px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 5px;
    text-align: center;
    pointer-events: none;
  "
>
  <div
    style="
      color: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      font-family: Inter, sans-serif;
      font-weight: 700;
      line-height: 14px;
      letter-spacing: 0.5px;
      pointer-events: none;
    "
  >
    Tap
  </div>

  <div
    style="
      color: white;
      font-size: 30px;
      font-family: Inter, sans-serif;
      font-weight: 700;
      line-height: 30px;
      pointer-events: none;
    "
  >
    Go
  </div>
</div>
</div>

      <!-- Header -->
      <div
        style="
          width: 375px;
          height: 110px;
          position: absolute;
          left: 0;
          top: 0;
          background: linear-gradient(
            135deg,
            #003d38 0%,
            #005c54 25%,
            #007e72 50%,
            #00a99d 75%,
            #00c9b0 100%
          );
          border-bottom-right-radius: 24px;
          border-bottom-left-radius: 24px;
        "
      >
        <div
          style="
            position: absolute;
            left: 20px;
            top: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 800;
            line-height: 26.4px;
            word-wrap: break-word;
          "
        >
          Go/No-Go Test
        </div>

       <!-- Profile button -->
<div
style="
  width: 44px;
  height: 44px;
  position: absolute;
  left: 311px;
  top: 51.5px;
  border-radius: 22px;
  outline: 1px #d1d5db solid;
  outline-offset: -1px;
  overflow: hidden;
  background: #007e72;
"
>
<img
  src="../images/profilepicture.jpeg"
  alt="Profile"
  style="
    width: 100%;
    height: 100%;
    object-fit: cover;
  "
/>
</div>
        </div>

        <!-- Bell icon -->
        <div
          style="
            width: 44px;
            height: 44px;
            position: absolute;
            left: 257px;
            top: 51.5px;
            background: #007e72;
            border-radius: 22px;
            outline: 1px #d1d5db solid;
            outline-offset: -1px;
          "
        >
          <div
            data-svg-wrapper
            style="
              position: absolute;
              left: 12px;
              top: 12px;
            "
          >
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M15 6.6665C15 5.34042 14.4732 4.06865 13.5355 3.13097C12.5979 2.19329 11.3261 1.6665 10 1.6665C8.67392 1.6665 7.40215 2.19329 6.46447 3.13097C5.52678 4.06865 5 5.34042 5 6.6665C5 12.4998 2.5 14.1665 2.5 14.1665H17.5C17.5 14.1665 15 12.4998 15 6.6665Z"
                stroke="white"
                stroke-opacity="0.9"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M11.4419 17.5C11.2954 17.7526 11.0851 17.9622 10.8321 18.1079C10.5791 18.2537 10.2922 18.3304 10.0003 18.3304C9.70828 18.3304 9.42142 18.2537 9.1684 18.1079C8.91539 17.9622 8.7051 17.7526 8.55859 17.5"
                stroke="white"
                stroke-opacity="0.9"
                stroke-width="1.66667"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>

    <script src="../js/app.js"></script>

  </body>
</html>
