<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../css/gonogo-interaction-states.css">
  </head>

  <body
    style="
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      font-family: Inter, sans-serif;
    "
  >
    <div
      style="
        width: 375px;
        height: 812px;
        position: relative;
        background: #E0ECEC;
        overflow: hidden;
        font-family: Inter, sans-serif;
      "
    >
      <!-- Main Card -->
      <div
        style="
          width: 335px;
          height: 574px;
          position: absolute;
          left: 20px;
          top: 130px;
          background: white;
          box-shadow: 0px 1px 4px rgba(0, 0, 0, 0.07);
          border-radius: 16px;
          border: 1px #d1d5db solid;
        "
      ></div>

      <!-- Error Text -->
      <div
        style="
          left: 50%;
          top: 288px;
          position: absolute;
          transform: translateX(-50%);
          color: #bd1919;
          font-size: 30px;
          font-weight: 700;
          text-align: center;
          white-space: nowrap;
        "
      >
        Oops! Keep going!
      </div>

      <!-- Trial Loading Text -->
      <div
        style="
          left: 50%;
          top: 404px;
          position: absolute;
          transform: translateX(-50%);
          color: black;
          font-size: 20px;
          font-weight: 400;
          letter-spacing: 0.1px;
          text-align: center;
          white-space: nowrap;
        "
      >
        Next trial loading...
      </div>

      <!-- Stop Test Secondary Button -->
      <a href="index.html" style="text-decoration: none;">
        <div
          class="stopBtnHover"
          style="
            width: 335px;
            height: 48px;
            position: absolute;
            left: 20px;
            top: 724px;
          "
        >
          <div
            style="
              width: 100%;
              height: 100%;
              position: absolute;
              left: 0;
              top: 0;
              background: white;
              border-radius: 100000px;
              border: 1px #A71818 solid;
            "
          ></div>

          <div
            style="
              position: absolute;
              left: 98px;
              top: 12px;
            "
          >
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
            >
              <path
                d="M6.4 19L5 17.6L10.6 12L5 6.4L6.4 5L12 10.6L17.6 5L19 6.4L13.4 12L19 17.6L17.6 19L12 13.4L6.4 19Z"
                fill="#A71818"
              />
            </svg>
          </div>

          <div
            style="
              position: absolute;
              left: 132px;
              top: 15px;
              color: #A71818;
              font-size: 15px;
              font-weight: 700;
            "
          >
            Stop Test
          </div>
        </div>
      </a>

      <!-- Header -->
      <div
        style="
          width: 375px;
          height: 110px;
          position: absolute;
          left: 0;
          top: 0;
          background: linear-gradient(
            135deg,
            #003d38 0%,
            #005c54 25%,
            #007e72 50%,
            #00a99d 75%,
            #00c9b0 100%
          );
          border-bottom-right-radius: 24px;
          border-bottom-left-radius: 24px;
        "
      >
        <div
          style="
            position: absolute;
            left: 20px;
            top: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: white;
            font-size: 22px;
            font-weight: 800;
            line-height: 26.4px;
            word-wrap: break-word;
          "
        >
          Go/No-Go Test
        </div>

        <!-- Profile Button -->
        <div
          style="
            width: 44px;
            height: 44px;
            position: absolute;
            left: 311px;
            top: 51.5px;
            border-radius: 22px;
            outline: 1px #d1d5db solid;
            outline-offset: -1px;
            overflow: hidden;
            background: #007e72;
          "
        >
          <img
            src="../images/profile-picture.jpeg"
            alt="Profile"
            style="
              width: 100%;
              height: 100%;
              object-fit: cover;
            "
          />
        </div>
      </div>

      <!-- Notification Icon -->
      <div
        style="
          width: 44px;
          height: 44px;
          position: absolute;
          left: 257px;
          top: 51.5px;
          background: #007e72;
          border-radius: 22px;
          outline: 1px #d1d5db solid;
          outline-offset: -1px;
        "
      >
        <div
          data-svg-wrapper
          style="
            position: absolute;
            left: 12px;
            top: 12px;
          "
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 20 20"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M15 6.6665C15 5.34042 14.4732 4.06865 13.5355 3.13097C12.5979 2.19329 11.3261 1.6665 10 1.6665C8.67392 1.6665 7.40215 2.19329 6.46447 3.13097C5.52678 4.06865 5 5.34042 5 6.6665C5 12.4998 2.5 14.1665 2.5 14.1665H17.5C17.5 14.1665 15 12.4998 15 6.6665Z"
              stroke="white"
              stroke-opacity="0.9"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M11.4419 17.5C11.2954 17.7526 11.0851 17.9622 10.8321 18.1079C10.5791 18.2537 10.2922 18.3304 10.0003 18.3304C9.70828 18.3304 9.42142 18.2537 9.1684 18.1079C8.91539 17.9622 8.7051 17.7526 8.55859 17.5"
              stroke="white"
              stroke-opacity="0.9"
              stroke-width="1.66667"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
      </div>
    </div>

    <script src="../js/app.js"></script>
  </body>
</html>
